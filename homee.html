<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>莓莓小窝 · 大聊天室 + 私密四友窝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'SF Pro Text', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f8eef4 0%, #ffe0ea 100%);
            min-height: 100vh;
            padding: 24px;
        }
        /* 主双栏布局 */
        .duplex {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        /* 大型聊天室（右侧主要区域） */
        .main-chat {
            flex: 3;
            min-width: 320px;
            background: #fffef9;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(139, 69, 107, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(2px);
            border: 1px solid #ffd9e8;
        }
        .chat-header {
            background: #ffb7cf;
            padding: 20px 24px;
            color: #2d1c24;
        }
        .chat-header h2 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            background: #592c3c;
            color: #ffe6f0;
            border-radius: 60px;
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        /* 消息区域 */
        .msg-pane {
            flex: 1;
            height: 460px;
            overflow-y: auto;
            padding: 20px;
            background: #fff7fa;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            width: fit-content;
            background: white;
            border-radius: 28px;
            padding: 10px 18px;
            box-shadow: 0 1px 3px #f3cfdf;
            animation: fadeSlide 0.2s ease;
        }
        .message.self {
            background: #ffe2ef;
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }
        .message.other {
            background: #f2f1f5;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
        }
        .msg-name {
            font-weight: 800;
            font-size: 0.75rem;
            color: #ad5f7e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .at-text {
            background: #e6c5d4;
            border-radius: 20px;
            padding: 0 6px;
            color: #8b3f5e;
        }
        .msg-text {
            font-size: 0.92rem;
            margin-top: 5px;
            word-break: break-word;
        }
        /* 游戏/娱乐工具栏 */
        .game-bar {
            background: #fcecf2;
            margin: 8px 20px;
            padding: 12px 18px;
            border-radius: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border: 1px solid #ffc0d6;
        }
        .game-btn {
            background: #ffebf0;
            border: none;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            color: #bc6f8f;
        }
        .game-btn:active { transform: scale(0.96); background: #fbc4d6; color: white;}
        .input-row {
            display: flex;
            gap: 12px;
            margin: 8px 20px 24px 20px;
            background: white;
            border-radius: 60px;
            padding: 6px 12px 6px 20px;
            border: 1px solid #ffb7cf;
            box-shadow: 0 4px 10px #ffd5e4;
        }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 1rem;
        }
        .input-row button {
            background: #f29bb9;
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        /* 私聊小窝区 (四个独立房间) */
        .private-wing {
            flex: 1.2;
            min-width: 280px;
            background: #fff5f8;
            border-radius: 48px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
        }
        .private-card {
            background: #ffffffdb;
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 12px;
            transition: all 0.1s;
            border: 1px solid #ffe0eb;
            cursor: pointer;
        }
        .private-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            border-bottom: 1px dashed #ffcfe1;
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .private-msgs {
            font-size: 0.7rem;
            color: #ab7b8f;
            height: 70px;
            overflow-y: auto;
            margin-bottom: 8px;
            padding: 4px;
        }
        .private-input-group {
            display: flex;
            gap: 5px;
            margin-top: 6px;
        }
        .private-input-group input {
            flex: 1;
            border-radius: 30px;
            border: 1px solid #ffbfd4;
            padding: 6px 10px;
            font-size: 0.7rem;
            background: #fffafc;
        }
        .private-input-group button {
            background: #f1bfd1;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
        }
        .action-log-mini {
            font-size: 0.65rem;
            background: #ffecf3;
            border-radius: 40px;
            padding: 6px 8px;
            margin-top: 8px;
            text-align: center;
            color: #b35d7e;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #ce91ac;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .active-room {
            background: #ffeef4;
            border-left: 6px solid #f06292;
        }
        .inline-game {
            background: #f3e3ea;
            border-radius: 28px;
            padding: 10px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="duplex">
    <!-- 左侧：四间私密小窝（精简无长描述） -->
    <div class="private-wing" id="privateWing">
        <!-- 四个卡片动态生成 -->
    </div>

    <!-- 右侧：大型聊天室（公共大厅） -->
    <div class="main-chat">
        <div class="chat-header">
            <h2>🍃 莓莓大客厅 · 全体畅聊 <span class="badge">✨ @好友 | 谜语 | 海龟汤 | 石头剪刀布</span></h2>
        </div>
        <div class="msg-pane" id="publicMessages">
            <div class="message other"><div class="msg-name">🍓 窝心小精灵</div><div class="msg-text">欢迎来到大聊天室～ 可以 @刘源 @于舒蕾 @张佳音 @孔垂晓 艾特他们，还有谜语/笑话/海龟汤/猜拳等你玩！✨</div></div>
        </div>
        <!-- 趣味小游戏快捷栏 -->
        <div class="game-bar" id="gameBar">
            <button class="game-btn" data-game="riddle">🧩 猜谜语</button>
            <button class="game-btn" data-game="joke">😂 冷笑话</button>
            <button class="game-btn" data-game="turtle">🐢 海龟汤</button>
            <button class="game-btn" data-game="rps">✊ 石头剪刀布</button>
            <button class="game-btn" data-game="dice">🎲 掷骰子</button>
        </div>
        <div class="input-row">
            <input type="text" id="publicInput" placeholder="说点什么... 例如：@刘源 今天穿搭好可爱" autocomplete="off">
            <button id="sendPublic">🐣 发送到大厅</button>
        </div>
        <div style="padding: 0 20px 16px 20px; font-size: 12px; color:#cb89a4;">
            💡 支持小游戏指令: /猜拳 石头 、/骰子 、/海龟汤线索 或者直接点按钮~
        </div>
    </div>
</div>
<footer>🍬 私聊小窝独立对话，大聊天室可@任何好友 + 20+趣味谜语/海龟汤脑洞～ 开心玩耍吧！</footer>

<script>
    // ---------- 四位好友数据 (无详细个人描述，仅保留昵称+头像emoji用于@) ----------
    const FRIENDS = [
        { id: "liuyuan", name: "刘源", emoji: "🍓", color: "#ffcad4" },
        { id: "yushulei", name: "于舒蕾", emoji: "🔫", color: "#d0f0d0" },
        { id: "zhangjiayin", name: "张佳音", emoji: "🏔️", color: "#cbe6fe" },
        { id: "kongchuixiao", name: "孔垂晓", emoji: "💄", color: "#fed0e4" }
    ];

    // 当前登录用户（模拟选择身份: 在大厅随机或默认访客名，但是为了好玩，让用户点击私密卡片选择一个身份用于大厅显示）
    let currentProfile = { name: "小莓访客", emoji: "🐣", id: "guest" }; 
    // 私密聊天室独立消息存储 (每个好友一个独立消息数组)
    let privateMessages = {
        liuyuan: [],
        yushulei: [],
        zhangjiayin: [],
        kongchuixiao: []
    };
    // 大厅消息存储
    let publicMessagesList = [];

    // DOM 元素
    const privateWingDiv = document.getElementById("privateWing");
    const publicMsgDiv = document.getElementById("publicMessages");
    const publicInput = document.getElementById("publicInput");
    const sendPublicBtn = document.getElementById("sendPublic");

    // 游戏库 ----------
    const riddles = [
        { q: "什么东西越洗越脏？", a: "水" },
        { q: "有一个字，人人都会念错，是什么字？", a: "错" },
        { q: "什么东西越热越爱出来？", a: "汗" },
        { q: "什么东西晚上才生出尾巴？", a: "流星" },
        { q: "什么东西碎了却没人伤心？", a: "泡沫" },
        { q: "什么球不能踢？", a: "眼球" }
    ];
    const jokes = [
        "为什么数学书总是很忧郁？因为它有太多问题。",
        "鱼为什么不吃电脑？因为怕中病毒。",
        "螃蟹的生意好不好？横着走，没人敢买。",
        "面包走着走着饿了，就把自己吃了。",
        "为什么小明不会游泳？因为他被水呛过。"
    ];
    // 海龟汤池（简易版）
    const turtleSoups = [
        { story: "一个人走进餐厅点了一份海龟汤，喝了一口就哭了。为什么？", hint: "想起了失踪多年的父亲", answer: "他父亲是海龟厨师，小时候给他做汤，后来失踪了。" },
        { story: "男人看到一条船，激动地哭了。", hint: "船名与他去世的妻子同名", answer: "船的名字是他已故妻子的名字。" }
    ];
    let currentSoup = null;       // 当前海龟汤题目
    let soupActive = false;       // 海龟汤进行中
    let soupHistory = [];

    // 猜拳结果
    let rpsWins = 0;

    // ---------- 辅助函数：添加大厅消息 ----------
    function addPublicMessage(sender, text, isSystem = false, isSelf = false) {
        const msgObj = { sender: sender, text: text, time: Date.now(), isSelf: (isSelf || (currentProfile.name === sender && !isSystem)) };
        publicMessagesList.push(msgObj);
        renderPublicMessages();
    }

    function renderPublicMessages() {
        publicMsgDiv.innerHTML = "";
        // 最新显示10~20条
        const latest = publicMessagesList.slice(-40);
        latest.forEach(msg => {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${msg.isSelf ? 'self' : 'other'}`;
            const nameSpan = document.createElement("div");
            nameSpan.className = "msg-name";
            nameSpan.innerHTML = msg.sender + (msg.isSelf ? " (你)" : "");
            const textSpan = document.createElement("div");
            textSpan.className = "msg-text";
            textSpan.innerHTML = parseAtEmoji(msg.text);
            msgDiv.appendChild(nameSpan);
            msgDiv.appendChild(textSpan);
            publicMsgDiv.appendChild(msgDiv);
        });
        publicMsgDiv.scrollTop = publicMsgDiv.scrollHeight;
    }

    function parseAtEmoji(txt) {
        // 简单将@名字加样式
        let newTxt = txt.replace(/@刘源/g, '<span class="at-text">🍓@刘源</span>');
        newTxt = newTxt.replace(/@于舒蕾/g, '<span class="at-text">🔫@于舒蕾</span>');
        newTxt = newTxt.replace(/@张佳音/g, '<span class="at-text">🏔️@张佳音</span>');
        newTxt = newTxt.replace(/@孔垂晓/g, '<span class="at-text">💄@孔垂晓</span>');
        return newTxt;
    }

    // 处理大厅消息内容和@逻辑，同时模仿朋友回应（大聊天室中，如果有人@某朋友，朋友会回应）
    function handlePublicMessage(rawText) {
        if(!rawText.trim()) return;
        const senderName = currentProfile.name;
        let finalText = rawText;
        addPublicMessage(senderName, finalText, false, true);

        // 检查@谁 并且让被艾特的朋友模拟回应
        const atMention = [];
        if(finalText.includes("@刘源")) atMention.push(FRIENDS[0]);
        if(finalText.includes("@于舒蕾")) atMention.push(FRIENDS[1]);
        if(finalText.includes("@张佳音")) atMention.push(FRIENDS[2]);
        if(finalText.includes("@孔垂晓")) atMention.push(FRIENDS[3]);
        
        if(atMention.length > 0) {
            atMention.forEach(friend => {
                setTimeout(() => {
                    let reply = "";
                    if(friend.id === "liuyuan") reply = "🍓 被cue到啦！今天的穿搭是小莓风～ 你真好✨";
                    else if(friend.id === "yushulei") reply = "🔫 哈哈我听到有人喊我！要不要一起打一把游戏？";
                    else if(friend.id === "zhangjiayin") reply = "🏔️ 哇！在聊户外运动吗？下周去露营呀！";
                    else reply = "💄 上班摸鱼看到艾特～ 开心！化个美美的妆聊～";
                    addPublicMessage(friend.name, reply, false, false);
                }, 500);
            });
        } else {
            // 随机增加一点趣味回应（10%几率随机一位朋友闲聊）
            if(Math.random() < 0.3) {
                const randomFriend = FRIENDS[Math.floor(Math.random()*FRIENDS.length)];
                setTimeout(() => {
                    const autoRes = ["这个好有趣！", "我也这么觉得耶~", "大客厅好热闹！", "嘿嘿大家都好可爱"].sort(()=>0.5-Math.random())[0];
                    addPublicMessage(randomFriend.name, autoRes, false, false);
                }, 600);
            }
        }

        // 游戏指令检测: /猜拳 石头 ...
        if(finalText.startsWith("/猜拳")) {
            const userChoice = finalText.replace("/猜拳", "").trim();
            if(userChoice === "石头" || userChoice === "剪刀" || userChoice === "布") {
                const botChoice = ["石头","剪刀","布"][Math.floor(Math.random()*3)];
                let result = "";
                if(userChoice === botChoice) result = "平局~";
                else if((userChoice === "石头" && botChoice === "剪刀") || (userChoice === "剪刀" && botChoice === "布") || (userChoice === "布" && botChoice === "石头")) result = "你赢了！🎉";
                else result = "你输了～ 再来一次";
                addPublicMessage("🎮 猜拳裁判", `你出${userChoice}，电脑出${botChoice}，${result}`, true);
            } else {
                addPublicMessage("🎮 猜拳提示", "指令正确格式: /猜拳 石头 或 剪刀/布", true);
            }
        } else if(finalText === "/骰子") {
            const diceVal = Math.floor(Math.random()*6)+1;
            addPublicMessage("🎲 骰子姬", `你掷出了 ${diceVal} 点！ ${diceVal >= 4 ? '运气不错~' : '下次会更好'}`, true);
        }
        // 主动海龟汤游戏 通过按钮处理，或关键词"海龟汤线索"
        if(finalText.startsWith("/海龟汤") || finalText.includes("海龟汤线索")) {
            if(soupActive && currentSoup) {
                const guess = finalText.replace("/海龟汤", "").trim();
                if(guess.length > 0) {
                    addPublicMessage("🐢 海龟汤助手", `猜到了线索: ${guess} ... 继续推理吧! 输入"揭晓汤底"获取答案`, true);
                    soupHistory.push(guess);
                } else {
                    addPublicMessage("🐢 海龟汤", `当前汤面: ${currentSoup.story}  可以继续提问线索~`, true);
                }
            } else {
                addPublicMessage("🐢 海龟汤", "暂时没有进行中的汤，请点击「海龟汤」按钮开启新汤！", true);
            }
        }
        if(finalText.includes("揭晓汤底") && soupActive && currentSoup) {
            addPublicMessage("🍲 汤底揭秘", `${currentSoup.answer}`, true);
            soupActive = false;
            currentSoup = null;
        }
    }

    // 游戏按钮逻辑
    function gameAction(type) {
        switch(type) {
            case "riddle":
                const r = riddles[Math.floor(Math.random()*riddles.length)];
                addPublicMessage("🧩 谜语人", `谜面: ${r.q}   (答案稍后揭晓~ 或者私聊问小窝)`, true);
                setTimeout(() => {
                    addPublicMessage("🧩 谜语人", `💡 谜底: ${r.a}`, true);
                }, 7000);
                break;
            case "joke":
                const joke = jokes[Math.floor(Math.random()*jokes.length)];
                addPublicMessage("😂 冷笑话机", joke, true);
                break;
            case "turtle":
                const newSoup = turtleSoups[Math.floor(Math.random()*turtleSoups.length)];
                currentSoup = newSoup;
                soupActive = true;
                soupHistory = [];
                addPublicMessage("🐢 海龟汤开启", `汤面：${newSoup.story}  大家可以通过/海龟汤 [线索] 来提问，输入"揭晓汤底"获取答案`, true);
                break;
            case "rps":
                // 石头剪刀布小游戏互动
                addPublicMessage("🎮 石头剪刀布", "请回复: /猜拳 石头 (或剪刀/布) 来对战！", true);
                break;
            case "dice":
                const val = Math.floor(Math.random()*6)+1;
                addPublicMessage("🎲 掷骰子", `🎲 骰子滚动... 结果: ${val} 点！`, true);
                break;
            default:break;
        }
    }

    // 私聊房间渲染 + 独立逻辑
    function renderPrivateRooms() {
        privateWingDiv.innerHTML = "";
        FRIENDS.forEach(friend => {
            const card = document.createElement("div");
            card.className = "private-card";
            const msgs = privateMessages[friend.id] || [];
            const lastMsg = msgs.length ? msgs[msgs.length-1].text.slice(0, 28) : "还没有消息～ 私聊呀";
            card.innerHTML = `
                <div class="private-header">
                    <span style="font-size:1.6rem;">${friend.emoji}</span>
                    <span style="font-weight:800;">${friend.name}</span>
                    <span style="font-size:0.6rem; background:#ffe1ec; padding:2px 8px; border-radius:20px;">私密小窝</span>
                </div>
                <div class="private-msgs" id="privMsg-${friend.id}">
                    ${msgs.slice(-3).map(m => `<div><b>${m.sender}</b>: ${m.text}</div>`).join('') || '💭 悄悄话空间'}
                </div>
                <div class="private-input-group">
                    <input type="text" id="privInput-${friend.id}" placeholder="和${friend.name}说悄悄话...">
                    <button data-id="${friend.id}" class="sendPrivBtn">💌 发送</button>
                </div>
                <div class="action-log-mini" id="privAction-${friend.id}">
                    🐾 戳一戳 拍一拍
                </div>
            `;
            privateWingDiv.appendChild(card);
        });
        // 绑定私聊发送事件 + 互动彩蛋
        FRIENDS.forEach(friend => {
            const btn = document.querySelector(`.sendPrivBtn[data-id="${friend.id}"]`);
            const inputField = document.getElementById(`privInput-${friend.id}`);
            if(btn) {
                btn.addEventListener("click", () => {
                    const text = inputField.value.trim();
                    if(!text) return;
                    // 存储私聊消息
                    if(!privateMessages[friend.id]) privateMessages[friend.id]=[];
                    privateMessages[friend.id].push({ sender: currentProfile.name, text: text, time: Date.now() });
                    inputField.value = "";
                    updatePrivateMsgUI(friend.id);
                    // 模拟朋友回复 （有趣回应）
                    setTimeout(() => {
                        let replyText = "";
                        if(friend.id === "liuyuan") replyText = "🍓 收到你的悄悄话～ 小莓送你一朵小花";
                        else if(friend.id === "yushulei") replyText = "🔫 啊哈！兰州今天的天气超棒，一起吃鸡不？";
                        else if(friend.id === "zhangjiayin") replyText = "🏔️ 户外爱好者狂喜，周末去骑行吧！";
                        else replyText = "💄 实习好累但看到你的消息就开心～ 贴贴";
                        privateMessages[friend.id].push({ sender: friend.name, text: replyText, time: Date.now() });
                        updatePrivateMsgUI(friend.id);
                        // 额外更新行动mini栏
                        const actionDiv = document.getElementById(`privAction-${friend.id}`);
                        if(actionDiv) actionDiv.innerHTML = `🌸 ${friend.name}回复: ${replyText.slice(0,22)}...`;
                    }, 800);
                });
            }
            // 拍一拍彩蛋（点击action区域触发，简单添加互动消息）
            const actionDiv = document.getElementById(`privAction-${friend.id}`);
            if(actionDiv) {
                actionDiv.style.cursor = "pointer";
                actionDiv.addEventListener("click", () => {
                    if(!privateMessages[friend.id]) privateMessages[friend.id]=[];
                    privateMessages[friend.id].push({ sender: "🐾 拍一拍", text: `${currentProfile.name} 轻轻拍了拍 ${friend.name}的小脑袋 ✨`, time: Date.now() });
                    updatePrivateMsgUI(friend.id);
                    setTimeout(() => {
                        privateMessages[friend.id].push({ sender: friend.name, text: "哎呀～ 被拍到了！ 开心的转圈圈~", time: Date.now() });
                        updatePrivateMsgUI(friend.id);
                    }, 200);
                });
            }
        });
    }

    function updatePrivateMsgUI(friendId) {
        const msgContainer = document.getElementById(`privMsg-${friendId}`);
        if(msgContainer) {
            const msgs = privateMessages[friendId] || [];
            msgContainer.innerHTML = msgs.slice(-4).map(m => `<div><b>${m.sender}</b>: ${m.text.substring(0,35)}</div>`).join('');
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }
    }

    // 身份选择器略微简单: 点击私密卡片头部设定为大聊天室身份（不隐藏，点一下右上角卡片表示当前大厅身份）
    function selectIdentity(friend) {
        currentProfile = { name: friend.name, emoji: friend.emoji, id: friend.id };
        addPublicMessage("🐣 系统", `${currentProfile.name} 进入了莓莓大客厅～ 大家欢迎🍓`, true);
        // 刷新私聊界面，显示当前身份提示
        renderPrivateRooms();
    }
    // 附加功能，卡片额外点击可切换身份
    function bindIdentityPicker() {
        const headers = document.querySelectorAll(".private-header");
        if(headers.length) {
            headers.forEach((header, idx) => {
                header.addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectIdentity(FRIENDS[idx]);
                });
            });
        }
    }

    // 监听发送公共消息
    sendPublicBtn.addEventListener("click", () => {
        const txt = publicInput.value;
        if(txt) {
            handlePublicMessage(txt);
            publicInput.value = "";
        }
    });
    publicInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendPublicBtn.click(); });

    // 绑定游戏按钮
    document.querySelectorAll(".game-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            const game = btn.getAttribute("data-game");
            gameAction(game);
        });
    });

    // 初始化私聊和大厅
    function init() {
        renderPrivateRooms();
        bindIdentityPicker();
        // 默认当前身份为第一位刘源（让体验更好）
        currentProfile = { name: "刘源", emoji: "🍓", id: "liuyuan" };
        addPublicMessage("🍓 窝心小助手", "当前大厅身份为 刘源 (你可以点击左侧其他朋友头像区上方的名字来切换身份哦~)", true);
    }
    init();
    // 定期刷新重新绑定身份选择器（避免动态覆盖）
    setInterval(() => {
        bindIdentityPicker();
    }, 1500);
</script>
</body>
</html>
