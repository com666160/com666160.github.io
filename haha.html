<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🍎 实习教师·解压办公室 | 怼人快乐屋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #fff3e0 0%, #ffe2c1 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Quicksand', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        /* 主容器 */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 250, 240, 0.9);
            border-radius: 64px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 2px solid #ffd5a4;
        }

        /* 头部 */
        .header {
            background: #ffb86b;
            padding: 18px 24px;
            text-align: center;
            border-bottom: 4px dashed #ffeecc;
        }
        .header h1 {
            font-size: 1.9rem;
            color: #5e2e0e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            background: #fdebb3;
            border-radius: 60px;
            padding: 4px 16px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* 双列布局 */
        .two-col {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 24px;
        }
        .characters-area {
            flex: 2;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .interact-area {
            flex: 1.5;
            min-width: 260px;
            background: #fff7ed;
            border-radius: 48px;
            padding: 20px;
            box-shadow: inset 0 0 0 2px #ffefd6, 0 8px 18px rgba(0,0,0,0.05);
        }

        /* 卡通卡片 */
        .character-card {
            background: #fffef8;
            border-radius: 52px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 12px 20px rgba(119, 68, 24, 0.15);
            transition: all 0.1s ease;
            border: 2px solid #ffddb0;
        }
        .avatar {
            font-size: 5rem;
            cursor: pointer;
            transition: 0.1s transform;
            display: inline-block;
        }
        .avatar:active {
            transform: scale(0.95);
        }
        .char-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 8px 0;
            color: #9b4b1a;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 16px 0 8px;
        }
        .cute-btn {
            background: #ffd6a5;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            color: #673d1c;
            font-size: 0.9rem;
        }
        .cute-btn:active {
            transform: scale(0.94);
            background: #ffbc70;
        }
        .reaction-text {
            background: #fff3e6;
            border-radius: 28px;
            padding: 8px;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #bc6f2c;
            min-height: 55px;
        }

        /* 互动区内部 */
        .joke-zone, .roast-zone {
            background: #fff0de;
            border-radius: 36px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .zone-title {
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 5px solid #ffa53e;
            padding-left: 12px;
            margin-bottom: 12px;
        }
        .content-box {
            background: white;
            border-radius: 32px;
            padding: 14px;
            margin: 8px 0;
            font-size: 0.9rem;
            min-height: 70px;
            color: #794f26;
        }
        .action-log {
            background: #faeedf;
            border-radius: 36px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .log-entry {
            font-size: 0.75rem;
            border-bottom: 1px dotted #f7cfaa;
            padding: 6px 0;
            color: #ac6f3c;
        }
        footer {
            background: #ffdbb5;
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            color: #a3652e;
        }
        button {
            font-family: inherit;
        }
        @media (max-width: 760px) {
            .avatar { font-size: 3.5rem; }
            .char-name { font-size: 1.2rem; }
            .cute-btn { padding: 5px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🍎 实习教师·解压办公室 🧨
            <span class="badge">怼人快乐屋 | 专治“老婆子”&“吵闹鬼”</span>
        </h1>
        <p>👊 单击卡通形象直接揍 / 挠 / 怼！ 拒绝鸡汤，只有搞笑和爽感 ✨</p>
    </div>
    <div class="two-col">
        <!-- 左边两个卡通形象 -->
        <div class="characters-area">
            <!-- 老婆子卡片 -->
            <div class="character-card">
                <div class="avatar" id="laopoAvatar">👵📋</div>
                <div class="char-name">👵 老婆子 · 任务NPC 👵</div>
                <div class="action-buttons">
                    <button class="cute-btn" data-action="punchLaopo">👊 打沙包</button>
                    <button class="cute-btn" data-action="tickleLaopo">🐾 挠痒痒</button>
                    <button class="cute-btn" data-action="roastLaopo">🗯️ 当面怼</button>
                    <button class="cute-btn" data-action="chalkLaopo">✏️ 扔粉笔头</button>
                </div>
                <div class="reaction-text" id="laopoReaction">👵 静静站着，等待你的“关爱”</div>
            </div>
            <!-- 学生军团卡片（吵闹小鬼） -->
            <div class="character-card">
                <div class="avatar" id="studentAvatar">👦👧👩‍🎓📢</div>
                <div class="char-name">🎒 吵闹学生军团 🎒</div>
                <div class="action-buttons">
                    <button class="cute-btn" data-action="quietStudent">🔇 静音术</button>
                    <button class="cute-btn" data-action="tickleStudent">🐣 挠痒痒惩罚</button>
                    <button class="cute-btn" data-action="roastStudent">🗯️ 毒舌吐槽</button>
                    <button class="cute-btn" data-action="chalkStudent">✏️ 粉笔点射</button>
                </div>
                <div class="reaction-text" id="studentReaction">📢 叽叽喳喳～ 吵得你头疼？来治他们！</div>
            </div>
        </div>

        <!-- 右侧区域：怼人语录+冷笑话+行动记录 -->
        <div class="interact-area">
            <div class="roast-zone">
                <div class="zone-title">🗯️ 怼人语录 · 随机发放 🗯️</div>
                <div class="content-box" id="roastText">点击下方按钮，收获一句爽言爽语</div>
                <button class="cute-btn" id="newRoastBtn" style="margin-top: 5px;">🤬 换一句怼人的话</button>
            </div>
            <div class="joke-zone">
                <div class="zone-title">😂 教师冷笑话 & 实习梗 😂</div>
                <div class="content-box" id="jokeText">点一下，笑一笑，烦事全消~</div>
                <button class="cute-btn" id="newJokeBtn" style="margin-top: 5px;">🍬 换个笑话</button>
            </div>
            <div class="action-log">
                <div class="zone-title">📋 解压战绩 · 互动记录</div>
                <div id="logContainer">
                    <div class="log-entry">✨ 欢迎来到怼人快乐屋！放心发泄～</div>
                </div>
            </div>
        </div>
    </div>
    <footer>💢 注意：虚拟解压，请勿当真。工作再烦，这里永远是你的情绪出口！</footer>
</div>

<script>
    // ----------------------------- 怼人语录库 (专怼老婆子和学生) -------------------------
    const roastLines = [
        "老婆子，您那堆杂活是生怕我闲出一秒啊？建议您自己体验一下实习生の快乐。",
        "表面：好的老师～ 内心：您这话说了一百遍了，耳朵起茧了。",
        "您是不是觉得年轻人是永动机？活干完了还要面带微笑说谢谢指教？",
        "有时候真的想问问：您当年实习也这么惨吗？哦，也许您已经忘了初心。",
        "学生吵闹像养鸭场，而老婆子像养鸭场场主，只会加活。",
        "这个班的噪音分贝，建议申报吉尼斯。",
        "老婆子递过来一沓卷子，我仿佛看到了她年轻时的怨念转移大法。",
        "您再给我派活，我就把您的养生枸杞换成咖啡豆。",
        "实习手册应该加一条：活着度过实习期，你就是王者。",
        "老婆子口头禅：年轻人嘛，多锻炼。 翻译：这破活我不想干。",
        "学生吵的时候，我就在心里默念：亲生的亲生的… 哦不是，不是我生的。",
        "你们再讲话，我就把你们的名字编进数学题里，让全校老师都看见！",
        "老婆子您知道吗？有一种加班叫‘帮忙’，有一种绝望叫‘顺便’。",
        "好想拥有一键静音实体按钮，先按老婆子，再按学生。",
        "今天也是被老婆子PUA的一天，但我学会了在心里竖中指（礼貌的那种）。"
    ];

    // 冷笑话库（实习教师特供）
    const jokeLines = [
        "为什么实习老师总带着保温杯？——因为里面装的是眼泪和续命咖啡。",
        "老婆子让我去搬书，我搬出了搬砖的气势，她笑着说：年轻人身体真好。",
        "学生问我：老师，你为什么总看手表？ 我：我在算距离下班还有几万年。",
        "实习鉴定表自我评价：能活着结束实习，已是奇迹。",
        "学生吵闹，我怒吼：安静！ 全班沉默3秒后，一个声音：老师你刚才好像教导主任。",
        "老婆子说‘再有五分钟就好’，我已经听了二十多个五分钟。",
        "最怕空气突然安静，最怕老婆子突然的关心（塞活）。",
        "实习最大的收获：学会了面部微笑，内心吐槽的分身术。",
        "学生作文《我的老师》：我的实习老师脾气很好，从来不发火（因为她已经麻了）。",
        "每当我想辞职，我就看看银行卡余额，然后继续微笑。",
        "老婆子给我一堆作业本，我笑着接住，心里默念：你是NPC，你是NPC。",
        "教室吵闹指数和我的下班欲望成正比。",
        "实习教会我：人生就像老婆子派活，你永远不知道下一件是什么。"
    ];

    // 针对老婆子互动的反应池（打、挠、怼、粉笔）
    const laopoPunchReactions = [
        "👵 哎哟！你竟然打我沙包？我记小本本上！", "👵 呜呜，年轻人不讲武德～", "👵 这一拳力道不错，给你多加一沓卷子（开玩笑）", "👵 哼！再打我就让你写教学反思！", "👵 服了服了，少派一件活", "👵 哎呀我的老腰..."
    ];
    const laopoTickleReactions = [
        "👵 哈哈哈别挠了！我怕痒！作业减半！", "👵 哎～哈哈 停停停，下周不找你开会了", "👵 你这小坏蛋，笑死我了", "👵 咯吱咯吱… 别闹了，我投降"
    ];
    const laopoRoastReactions = [
        "👵 …你竟敢怼我？但是好像有点道理", "👵 现在的年轻人啊，嘴皮子挺溜", "👵 （沉默三秒）这活还是我自己干吧", "👵 实习生，你有点意思"
    ];
    const laopoChalkReactions = [
        "👵 粉笔头？当年我也是扔粉笔高手！", "👵 哎呀！砸到我养生杯了", "👵 好准！这节公开课你去上", "👵 粉笔头反弹——失败，你赢了"
    ];

    // 学生互动反应池
    const studentQuietReactions = [
        "🧒 突然安静... 老师好凶哦", "👧 嘘～老师要用静音术了", "🎒 世界清净了！", "📢 学生们捂住嘴巴，不敢出声"
    ];
    const studentTickleReactions = [
        "👦 哈哈哈 老师别挠了，我好好听课！", "👧 咯咯咯 我们再也不吵了", "👩‍🎓 投降投降！作业马上交", "🧸 全班笑趴，噪音变笑声"
    ];
    const studentRoastReactions = [
        "🧒 老师嘴好毒，但是我喜欢", "👧 被吐槽了，有点爽怎么回事", "🎒 老师我们错了，别骂了别骂了", "📚 毒舌老师上线，学生集体沉默"
    ];
    const studentChalkReactions = [
        "✏️ 粉笔头精准命中吵闹王！", "🎯 哇，老师神枪手！不敢说话了", "📢 被粉笔点名的同学乖乖坐好", "⚡ 粉笔制裁，教室瞬间安静"
    ];

    // 辅助函数：随机取数组元素
    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // 日志记录
    let logEntries = [];
    function addLog(message, emoji = "🎉") {
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        logEntries.unshift(`${emoji} ${time} ${message}`);
        if(logEntries.length > 12) logEntries.pop();
        const logContainer = document.getElementById("logContainer");
        logContainer.innerHTML = logEntries.map(entry => `<div class="log-entry">${entry}</div>`).join('');
        if(logEntries.length === 0) logContainer.innerHTML = '<div class="log-entry">✨ 还没有解压记录，快互动~</div>';
    }

    // 更新卡通角色的反应文字
    function setLaopoReaction(text) {
        const laopoReactDiv = document.getElementById("laopoReaction");
        laopoReactDiv.innerHTML = text;
        setTimeout(() => {
            if(laopoReactDiv.innerHTML === text) {
                laopoReactDiv.innerHTML = "👵 老婆子恢复平静，等待下次互动";
            }
        }, 2000);
    }
    function setStudentReaction(text) {
        const studentReactDiv = document.getElementById("studentReaction");
        studentReactDiv.innerHTML = text;
        setTimeout(() => {
            if(studentReactDiv.innerHTML === text) {
                studentReactDiv.innerHTML = "🎒 学生军团叽叽喳喳，等你来治~";
            }
        }, 2000);
    }

    // 处理老婆子互动
    function interactLaopo(action) {
        let reaction = "";
        let logMsg = "";
        switch(action) {
            case "punch":
                reaction = randomItem(laopoPunchReactions);
                logMsg = `👊 对着老婆子沙包狠狠打了一拳！ ${reaction}`;
                break;
            case "tickle":
                reaction = randomItem(laopoTickleReactions);
                logMsg = `🐾 偷袭老婆子挠痒痒！ ${reaction}`;
                break;
            case "roast":
                reaction = randomItem(laopoRoastReactions);
                logMsg = `🗯️ 当面怼了老婆子一句：${reaction}`;
                break;
            case "chalk":
                reaction = randomItem(laopoChalkReactions);
                logMsg = `✏️ 扔粉笔头击中老婆子！ ${reaction}`;
                break;
            default: return;
        }
        setLaopoReaction(reaction);
        addLog(logMsg, "🤪");
        // 加一些额外特效，改变头像抖动 (简单动画)
        const avatar = document.getElementById("laopoAvatar");
        avatar.style.transform = "rotate(2deg) scale(0.98)";
        setTimeout(() => { avatar.style.transform = ""; }, 150);
    }

    // 处理学生互动
    function interactStudent(action) {
        let reaction = "";
        let logMsg = "";
        switch(action) {
            case "quiet":
                reaction = randomItem(studentQuietReactions);
                logMsg = `🔇 施展静音术！学生瞬间安静～ ${reaction}`;
                break;
            case "tickle":
                reaction = randomItem(studentTickleReactions);
                logMsg = `🐣 冲进学生堆挠痒痒！ ${reaction}`;
                break;
            case "roast":
                reaction = randomItem(studentRoastReactions);
                logMsg = `🗯️ 毒舌吐槽学生军团：${reaction}`;
                break;
            case "chalk":
                reaction = randomItem(studentChalkReactions);
                logMsg = `✏️ 粉笔精准点射，吵闹头目被击中！ ${reaction}`;
                break;
            default: return;
        }
        setStudentReaction(reaction);
        addLog(logMsg, "😂");
        const studentAvatar = document.getElementById("studentAvatar");
        studentAvatar.style.transform = "scale(0.95)";
        setTimeout(() => { studentAvatar.style.transform = ""; }, 150);
    }

    // 随机怼人语录
    function showRandomRoast() {
        const roast = randomItem(roastLines);
        document.getElementById("roastText").innerHTML = `💢 ${roast}`;
        addLog(`怼人语录刷新: ${roast.substring(0, 40)}...`, "🗯️");
    }

    function showRandomJoke() {
        const joke = randomItem(jokeLines);
        document.getElementById("jokeText").innerHTML = `😂 ${joke}`;
        addLog(`冷笑话: ${joke.substring(0, 40)}...`, "🍬");
    }

    // 绑定所有按钮事件
    function bindEvents() {
        // 老婆子按钮组
        document.querySelectorAll("[data-action]").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const action = btn.getAttribute("data-action");
                if (action.startsWith("punchLaopo")) interactLaopo("punch");
                else if (action.startsWith("tickleLaopo")) interactLaopo("tickle");
                else if (action.startsWith("roastLaopo")) interactLaopo("roast");
                else if (action.startsWith("chalkLaopo")) interactLaopo("chalk");
                else if (action.startsWith("quietStudent")) interactStudent("quiet");
                else if (action.startsWith("tickleStudent")) interactStudent("tickle");
                else if (action.startsWith("roastStudent")) interactStudent("roast");
                else if (action.startsWith("chalkStudent")) interactStudent("chalk");
            });
        });

        // 点击头像也可以触发随机动作（额外快乐）
        const laopoAvatar = document.getElementById("laopoAvatar");
        laopoAvatar.addEventListener("click", () => {
            const actions = ["punch", "tickle", "roast", "chalk"];
            const rand = randomItem(actions);
            interactLaopo(rand);
        });
        const studentAvatar = document.getElementById("studentAvatar");
        studentAvatar.addEventListener("click", () => {
            const actions = ["quiet", "tickle", "roast", "chalk"];
            const rand = randomItem(actions);
            interactStudent(rand);
        });

        document.getElementById("newRoastBtn").addEventListener("click", showRandomRoast);
        document.getElementById("newJokeBtn").addEventListener("click", showRandomJoke);
    }

    // 初始化一些随机内容
    function init() {
        showRandomRoast();
        showRandomJoke();
        addLog("🍎 实习教师专属解压室已开启！快来揍老婆子、治学生", "🧨");
        bindEvents();
    }

    init();
</script>
</body>
</html>
