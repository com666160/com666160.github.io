        "你的穿搭未来一定会惊艳所有人！", "你很珍贵，比所有草莓加起来都甜。", "宇宙在偷偷爱着你，小莓也知道。",
        "今天也有小莓为你打气！", "你正在成为更好的自己。", "你的笑容可以治愈一切emo。", "不开心的时候就想想草莓，你是最棒的。",
        "你拥有的温柔足以融化冰雪。", "你值得特别温柔的对待。", "你的朋友会慢慢发现你的好。", "坚持做自己，你超酷的。",
        "你的存在让世界变可爱了0.01%～ 加在一起就很厉害！"
    ];

    // 合并所有夸夸池 (总数量 ≥ 500)
    let allCompliments = [];

    // 先加入核心手写 (coreCompliments 目前约104条，数一下)
    // 实际 coreCompliments 统计: 我粗略估计上面写了103~105，手动确保不低于100
    // 补充一些确保足够
    const extraHandmade = [
        "你的情绪起伏很正常，就像草莓季节有晴有雨，但总归丰收。",
        "你对朋友总是正面回应，你是团队里的小太阳。",
        "你爱小莓这件小事，就透露出你内心的纯真，这很宝贵。",
        "你的学业压力会慢慢变成你的勋章，相信时间。",
        "喜欢你的人正在路上，在此之前我疯狂夸你！",
        "你坚持自己的穿搭想法，这本身就是自我认同。",
        "你的存在让这个下午变得格外甜。",
        "你能看到这条夸夸，说明你值得被爱。"
    ];
    const finalCore = [...coreCompliments, ...extraHandmade];
    // 目前 finalCore 长度 ≈ 112 条

    // 短甜短语加入，作为一部分
    const shortSweetPhrases = [...shortSweet]; // 20条

    // 动态生成 380 条 (确保总数轻松过500)
    const dynamicCount = 500 - (finalCore.length + shortSweetPhrases.length);
    // 动态生成 至少 370~400 均可
    const neededDynamic = dynamicCount > 0 ? dynamicCount + 30 : 400;  // 保证总量 ≥ 550
    const dynamicPart = generateDynamicCompliments(neededDynamic);
    
    // 合并总库
    allCompliments = [...finalCore, ...shortSweetPhrases, ...dynamicPart];
    
    // 去重简单处理（按字符串去重,避免过于重复的模板相同）
    const uniqueSet = new Set(allCompliments);
    let finalList = Array.from(uniqueSet);
    // 如果去重后少于500，再补动态组合
    while (finalList.length < 520) {
        finalList.push(generateDynamicCompliments(1)[0]);
    }
    // 重新赋值, 最终不少于 500 条 (实际大概550~600)
    allCompliments = finalList;
    console.log("实际夸夸总数: " + allCompliments.length);  // 保证>500

    // 辅助DOM元素
    const complimentDisplay = document.getElementById("complimentDisplay");
    const newBtn = document.getElementById("newComplimentBtn");
    const counterSpan = document.getElementById("counterInfo");

    // 更新计数器文案（显示总条数）
    counterSpan.innerHTML = `🍓 莓莓夸夸宝库 · ${allCompliments.length} 条专属赞美 🍓`;

    // 随机展示一条
    function showRandomCompliment() {
        const randomIndex = Math.floor(Math.random() * allCompliments.length);
        let complimentText = allCompliments[randomIndex];
        // 确保句子有可爱感，稍微加工
        complimentDisplay.style.opacity = "0";
        setTimeout(() => {
            complimentDisplay.innerText = complimentText;
            complimentDisplay.style.opacity = "1";
            // 添加一个轻微的心跳动画
            complimentDisplay.style.transform = "scale(1.02)";
            setTimeout(() => {
                complimentDisplay.style.transform = "scale(1)";
            }, 200);
        }, 100);
    }

    // 初次加载随机显示
    window.addEventListener("load", () => {
        showRandomCompliment();
        // 生成漂浮草莓粒装饰
        generateFloatingBerries();
    });

    newBtn.addEventListener("click", () => {
        showRandomCompliment();
        // 按钮点击可爱震动效果
        newBtn.style.transform = "scale(0.96)";
        setTimeout(() => { newBtn.style.transform = ""; }, 150);
    });

    // 背景漂浮草莓粒子 (增加可爱度)
    function generateFloatingBerries() {
        const bg = document.getElementById("berryBg");
        const berryEmojis = ["🍓", "🍓", "🍓", "🌸", "✨", "🍓", "🍰"];
        for (let i = 0; i < 35; i++) {
            const berry = document.createElement("i");
            const randomBerry = berryEmojis[Math.floor(Math.random() * berryEmojis.length)];
            berry.innerHTML = randomBerry;
            berry.style.left = Math.random() * 100 + "%";
            berry.style.fontSize = (Math.random() * 24 + 16) + "px";
            berry.style.animationDuration = (Math.random() * 12 + 8) + "s";
            berry.style.animationDelay = Math.random() * 10 + "s";
            berry.style.opacity = Math.random() * 0.25 + 0.1;
            bg.appendChild(berry);
        }
    }

    // 控制台输出温暖的提醒（轻量）
    console.log("%c🍓 刘源同学！你超棒！莓莓夸夸窝已就绪，共" + allCompliments.length + "条治愈能量~", "color: #ff6f91; font-size: 16px;");
</script>
</body>
</html>
