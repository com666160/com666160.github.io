<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵境·HTML工坊 | 短链+长链一键生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #eef2ff;
        }

        .top-bar {
            background: #11131f;
            border-bottom: 1px solid #262935;
            padding: 0.6rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 600;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #252a3a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #e2e8f0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button.primary {
            background: #3b4bff;
            color: white;
            box-shadow: 0 2px 8px rgba(59, 75, 255, 0.3);
        }

        button.primary:hover {
            background: #2f3de0;
            transform: translateY(-1px);
        }

        button.long-btn {
            background: #475569;
        }

        button.long-btn:hover {
            background: #5a6b8a;
        }

        button:hover {
            background: #32374a;
            transform: translateY(-1px);
        }

        .share-preview {
            background: #1e2130;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.7rem;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex: 1;
            min-width: 200px;
        }

        .share-preview input {
            background: #0f111c;
            border: 1px solid #33384b;
            padding: 5px 10px;
            border-radius: 30px;
            color: #b9c3db;
            flex: 1;
            min-width: 150px;
            font-size: 0.7rem;
            outline: none;
        }

        .main-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
            background: #0b0e17;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f1222;
            border-right: 1px solid #252836;
            overflow: hidden;
        }

        .preview-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: -2px 0 12px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            background: #161a2c;
            padding: 6px 16px;
            font-size: 0.7rem;
            font-weight: 500;
            border-bottom: 1px solid #2a2e42;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.3px;
        }

        textarea {
            flex: 1;
            background: #0a0c18;
            color: #e2e8f0;
            border: none;
            padding: 18px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        .status-bar {
            background: #11131f;
            border-top: 1px solid #262935;
            padding: 5px 16px;
            font-size: 0.7rem;
            color: #7e85a3;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 700px) {
            .main-workspace {
                flex-direction: column;
            }
            .editor-panel {
                border-right: none;
                border-bottom: 1px solid #252836;
                min-height: 45%;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .share-preview input {
                width: 100%;
            }
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3ae6;
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: white;
            z-index: 2000;
            pointer-events: none;
            transition: 0.2s;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        ◤ 灵境·HTML工坊 ◢
        <span style="font-size: 0.6rem; background: #252a3a; padding: 2px 8px; border-radius: 20px;">长链+短链</span>
    </div>
    <div class="action-buttons">
        <button id="runBtn" class="primary">▶ 刷新预览</button>
        <button id="shortenBtn" style="background:#10b981;">🔗 生成短链接</button>
        <button id="longBtn" class="long-btn">📝 生成长链接</button>
        <button id="copyBtn">📋 复制链接</button>
        <button id="resetDemoBtn">📄 加载模板</button>
    </div>
    <div class="share-preview">
        <span>🔗 链接↓</span>
        <input type="text" id="linkInput" readonly placeholder="点击「生成长链接」或「生成短链接」">
    </div>
</div>

<div class="main-workspace">
    <div class="editor-panel">
        <div class="panel-header">
            <span>✏️ HTML 源代码编辑器</span>
            <span>实时修改 + 右侧实时预览</span>
        </div>
        <textarea id="htmlCode"></textarea>
    </div>
    <div class="preview-panel">
        <div class="panel-header">
            <span>🔍 实时预览窗口 (所见即所得)</span>
            <span>⚡ 自动渲染</span>
        </div>
        <iframe id="previewFrame" title="HTML实时预览" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
</div>
<div class="status-bar">
    <span>✨ 编辑代码 → 点击「生成长链接」获得完整链接 → 点击「生成短链接」获得短链接</span>
    <span>📌 长链接永久有效 | 短链接方便分享</span>
</div>

<script>
    // DOM 元素
    const textarea = document.getElementById('htmlCode');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const shortenBtn = document.getElementById('shortenBtn');
    const longBtn = document.getElementById('longBtn');
    const copyBtn = document.getElementById('copyBtn');
    const resetDemoBtn = document.getElementById('resetDemoBtn');
    const linkInput = document.getElementById('linkInput');

    let toastTimeout = null;
    function showMessage(msg, isError = false) {
        let toast = document.querySelector('.toast-msg');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#b91c1ce6' : '#2d3a5fe6';
        toast.style.opacity = '1';
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.style.opacity = '0';
        }, 3000);
    }

    // 更新预览
    function updatePreview() {
        let code = textarea.value;
        if (!code.trim()) {
            code = getDefaultTemplate();
            textarea.value = code;
        }
        const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(code);
        iframeDoc.close();
    }

    // 默认模板
    function getDefaultTemplate() {
        return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>研究计划书：企业ESG表现与债务融资成本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f2f4f8;
            font-family: system-ui, sans-serif;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
        }
        h1 { font-size: 1.8rem; color: #0a2942; margin-bottom: 0.5rem; }
        .sub { color: #5b6e8c; border-left: 3px solid #9aaebf; padding-left: 1rem; margin: 0.5rem 0 1.5rem 0; }
        .section { margin-bottom: 2rem; }
        .section-title { font-size: 1.3rem; font-weight: 600; color: #1f3b4c; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.4rem; margin-bottom: 1rem; }
        .card { background: #f9fafc; border-left: 4px solid #6c8fb3; padding: 1rem 1.5rem; border-radius: 16px; margin-bottom: 1rem; }
        .hypothesis { background: #fefaf5; border-left: 4px solid #c9a87b; padding: 1rem 1.5rem; border-radius: 14px; margin-bottom: 1rem; }
        .footer { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eef2f8; color: #6f8eae; font-size: 0.75rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>ESG表现与债务融资成本：<br>基于信息不对称缓解视角的实证研究</h1>
    <div class="sub">理论拓展 · 因果识别 · 面板数据分析</div>
    
    <div class="section">
        <div class="section-title">一、研究动机与理论贡献</div>
        <div class="card"><strong>现实背景：</strong>双碳目标与ESG投资浪潮下，绿色金融体系快速发展。</div>
        <div class="card"><strong>文献缺口：</strong>现有文献对债务融资成本影响机制尤其是"信息不对称缓解"渠道缺乏深入检验。</div>
    </div>
    
    <div class="section">
        <div class="section-title">二、研究假设</div>
        <div class="hypothesis"><strong>H1：</strong>ESG表现越好的企业，其债务融资成本越低。</div>
        <div class="hypothesis"><strong>H2：</strong>ESG表现通过缓解信息不对称来降低债务融资成本。</div>
        <div class="hypothesis"><strong>H3：</strong>降低效应在民营企业、高融资约束企业中更显著。</div>
    </div>
    
    <div class="section">
        <div class="section-title">三、实证设计</div>
        <div class="card"><strong>数据来源：</strong>CSMAR + Wind，2015-2024年A股上市公司</div>
        <div class="card"><strong>核心变量：</strong>华证ESG评分、利息支出/平均有息负债</div>
        <div class="card"><strong>计量方法：</strong>面板固定效应、中介效应模型、PSM-DID</div>
    </div>
    
    <div class="footer">
        数据量约2.2万观测值 | Stata/Python均可完成
    </div>
</div>
</body>
</html>`;
    }

    // 生成长链接（基于Hash存储完整代码）
    function generateLongLink() {
        const code = textarea.value;
        if (!code.trim()) {
            showMessage("请先编写一些HTML代码再分享", true);
            return null;
        }
        const encoded = encodeURIComponent(code);
        const baseUrl = window.location.href.split('#')[0].split('?')[0];
        return `${baseUrl}#code=${encoded}`;
    }

    // 调用缩我(suowo.cn) API 生成短链接
    async function shortenWithSuowo(longUrl) {
        try {
            const response = await fetch(`https://api.suowo.cn/v1/api/shorten`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    url: longUrl
                })
            });
            
            if (response.ok) {
                const data = await response.json();
                if (data && data.code === 200 && data.data && data.data.short_url) {
                    return data.data.short_url;
                }
            }
        } catch (e) {
            console.log("缩我API失败:", e);
        }
        return null;
    }

    // 备用方案：使用 TinyURL
    async function shortenWithTinyURL(longUrl) {
        try {
            const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
            if (res.ok) {
                const short = await res.text();
                if (short && short.startsWith('http')) return short;
            }
        } catch (e) {}
        return null;
    }

    // 生成短链接
    async function generateShortLink() {
        const longLink = generateLongLink();
        if (!longLink) return;
        
        showMessage("⏳ 正在生成短链接...", false);
        
        let shortLink = await shortenWithSuowo(longLink);
        if (!shortLink) {
            shortLink = await shortenWithTinyURL(longLink);
        }
        
        if (shortLink) {
            linkInput.value = shortLink;
            showMessage("✅ 短链接生成成功！点击「复制链接」即可分享", false);
            try {
                await navigator.clipboard.writeText(shortLink);
                showMessage("✅ 短链接已自动复制到剪贴板！", false);
            } catch(e) {}
        } else {
            linkInput.value = longLink;
            showMessage("⚠️ 短链接服务暂时不可用，已生成长链接", false);
        }
    }

    // 生成长链接并显示
    function generateAndShowLongLink() {
        const longLink = generateLongLink();
        if (!longLink) return;
        
        linkInput.value = longLink;
        showMessage("✅ 长链接已生成！点击「复制链接」即可分享", false);
        
        // 更新地址栏
        if (!window.location.href.includes('#code=')) {
            history.pushState(null, '', longLink);
        }
    }

    // 复制链接
    async function copyShareLink() {
        const link = linkInput.value;
        if (!link || link === "") {
            showMessage("请先点击「生成长链接」或「生成短链接」", true);
            return;
        }
        try {
            await navigator.clipboard.writeText(link);
            showMessage("📋 链接已复制到剪贴板！可粘贴分享", false);
        } catch (err) {
            showMessage("手动复制链接即可", true);
        }
    }

    // 加载模板
    function loadTemplate() {
        const template = getDefaultTemplate();
        textarea.value = template;
        updatePreview();
        showMessage("已加载研究计划书模板，可自由修改", false);
        linkInput.value = "";
    }

    // 从Hash加载代码
    function loadCodeFromHash() {
        const hash = window.location.hash.substring(1);
        if (hash && hash.startsWith('code=')) {
            try {
                let decoded = decodeURIComponent(hash.substring(5));
                if (decoded) {
                    textarea.value = decoded;
                    updatePreview();
                    showMessage("已从分享链接加载内容", false);
                    return true;
                }
            } catch (e) {}
        }
        return false;
    }

    // 事件绑定
    function bindEvents() {
        runBtn.addEventListener('click', () => {
            updatePreview();
            showMessage("预览已刷新", false);
        });
        shortenBtn.addEventListener('click', generateShortLink);
        longBtn.addEventListener('click', generateAndShowLongLink);
        copyBtn.addEventListener('click', copyShareLink);
        resetDemoBtn.addEventListener('click', loadTemplate);
        
        textarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                updatePreview();
            }
        });
    }

    // 初始化
    function init() {
        bindEvents();
        const loaded = loadCodeFromHash();
        if (!loaded) {
            loadTemplate();
        }
        updatePreview();
    }
    
    init();
</script>
</body>
</html>
