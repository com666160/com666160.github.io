<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵境·HTML工坊 | 实时预览与短链分享系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c10;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #eef2ff;
        }

        /* 顶部工具栏 */
        .top-bar {
            background: #11131f;
            border-bottom: 1px solid #262935;
            padding: 0.6rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 600;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #252a3a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #e2e8f0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button.primary {
            background: #3b4bff;
            color: white;
            box-shadow: 0 2px 8px rgba(59, 75, 255, 0.3);
        }

        button.primary:hover {
            background: #2f3de0;
            transform: translateY(-1px);
        }

        button:hover {
            background: #32374a;
            transform: translateY(-1px);
        }

        .share-preview {
            background: #1e2130;
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.7rem;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .share-preview input {
            background: #0f111c;
            border: 1px solid #33384b;
            padding: 5px 10px;
            border-radius: 30px;
            color: #b9c3db;
            width: 260px;
            font-size: 0.7rem;
            outline: none;
        }

        /* 主体：左右分屏（编辑器 + 实时预览） */
        .main-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
            background: #0b0e17;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f1222;
            border-right: 1px solid #252836;
            overflow: hidden;
        }

        .preview-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: -2px 0 12px rgba(0, 0, 0, 0.3);
        }

        .panel-header {
            background: #161a2c;
            padding: 6px 16px;
            font-size: 0.7rem;
            font-weight: 500;
            border-bottom: 1px solid #2a2e42;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.3px;
        }

        textarea {
            flex: 1;
            background: #0a0c18;
            color: #e2e8f0;
            border: none;
            padding: 18px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        .status-bar {
            background: #11131f;
            border-top: 1px solid #262935;
            padding: 5px 16px;
            font-size: 0.7rem;
            color: #7e85a3;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 700px) {
            .main-workspace {
                flex-direction: column;
            }
            .editor-panel {
                border-right: none;
                border-bottom: 1px solid #252836;
                min-height: 45%;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .share-preview input {
                width: 100%;
            }
        }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a3ae6;
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: white;
            z-index: 2000;
            pointer-events: none;
            transition: 0.2s;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        ◤ 灵境·HTML工坊 ◢
        <span style="font-size: 0.6rem; background: #252a3a; padding: 2px 8px; border-radius: 20px;">实时预览+短链分享</span>
    </div>
    <div class="action-buttons">
        <button id="runBtn" class="primary">▶ 刷新预览</button>
        <button id="shareBtn">🔗 生成短链接</button>
        <button id="copyLinkBtn">📋 复制链接</button>
        <button id="resetDemoBtn">📄 加载研究模板</button>
    </div>
    <div class="share-preview">
        <span>🔗 分享链接↓</span>
        <input type="text" id="shareLinkInput" readonly placeholder="点击「生成短链接」自动生成" size="30">
    </div>
</div>

<div class="main-workspace">
    <div class="editor-panel">
        <div class="panel-header">
            <span>✏️ HTML 源代码编辑器</span>
            <span>实时修改 + 右侧实时预览</span>
        </div>
        <textarea id="htmlCode" placeholder="编写您的 HTML/CSS/JS 代码……"></textarea>
    </div>
    <div class="preview-panel">
        <div class="panel-header">
            <span>🔍 实时预览窗口 (所见即所得)</span>
            <span>⚡ 自动渲染</span>
        </div>
        <iframe id="previewFrame" title="HTML实时预览" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
</div>
<div class="status-bar">
    <span>✨ 左侧编辑代码 → 点击「生成短链接」→ 获得短链 → 复制分享给任何人打开即看</span>
    <span>📌 支持 HTML/CSS/JS | 内置研究计划书模板</span>
</div>

<script>
    // ------------------- DOM 元素 -------------------
    const textarea = document.getElementById('htmlCode');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const shareBtn = document.getElementById('shareBtn');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const resetDemoBtn = document.getElementById('resetDemoBtn');
    const shareLinkInput = document.getElementById('shareLinkInput');

    // ------------------- 辅助函数：提示消息 -------------------
    let toastTimeout = null;
    function showMessage(msg, isError = false) {
        let toast = document.querySelector('.toast-msg');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#b91c1ce6' : '#2d3a5fe6';
        toast.style.opacity = '1';
        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.style.opacity = '0';
        }, 2800);
    }

    // ------------------- 核心预览函数 -------------------
    function updatePreview() {
        let code = textarea.value;
        if (!code.trim()) {
            // 友好的默认空白页面（带提示）
            code = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>灵境工坊</title><style>body{font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f6fa;margin:0;} .card{text-align:center;background:white;padding:2rem;border-radius:32px;box-shadow:0 8px 20px rgba(0,0,0,0.05);}</style></head>
<body><div class="card"><h1>✨ 灵境·HTML工坊</h1><p>在左侧编辑器中编写 HTML/CSS/JS，点击「刷新预览」或直接生成短链接分享。</p><button onclick="alert('交互测试成功')">点击测试</button></div></body>
</html>`;
            textarea.value = code;
        }
        const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(code);
        iframeDoc.close();
    }

    // ------------------- 基于短链接服务(TinyURL) + 降级方案 -------------------
    // 生成长链接（基于Hash存储完整代码）
    function generateLongLink() {
        const code = textarea.value;
        if (!code.trim()) {
            showMessage("请先编写一些HTML代码再分享", true);
            return null;
        }
        const encoded = encodeURIComponent(code);
        const baseUrl = window.location.href.split('#')[0];
        return `${baseUrl}#code=${encoded}`;
    }

    // 调用免费短链接服务 (TinyURL 主方案, 备选 is.gd)
    async function shortenUrlWithFallback(longUrl) {
        // 主方案：TinyURL (速度快，支持跨域)
        try {
            const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
            if (response.ok) {
                const short = await response.text();
                if (short && short.startsWith('http')) return short;
            }
        } catch (e) { console.log("TinyURL 失败", e); }
        
        // 备用方案：is.gd
        try {
            const res = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
            if (res.ok) {
                const short = await res.text();
                if (short && short.startsWith('http')) return short;
            }
        } catch (e) { console.log("is.gd 失败", e); }
        
        return null; // 短链服务都失败
    }

    // 主逻辑：生成短链接并填入输入框
    async function generateShortLink() {
        const longLink = generateLongLink();
        if (!longLink) return;
        
        showMessage("⏳ 正在生成短链接，请稍候...", false);
        const shortLink = await shortenUrlWithFallback(longLink);
        
        if (shortLink) {
            shareLinkInput.value = shortLink;
            showMessage("✅ 短链接生成成功！点击「复制链接」即可分享", false);
            // 同时也把当前地址栏更新为长链 (便于直接复制地址栏也可用)
            if (!window.location.href.includes('#code=')) {
                history.pushState(null, '', longLink);
            }
        } else {
            // 如果短链接服务暂时不可用，则退而使用完整长链接（用户仍可分享，只是长一点）
            shareLinkInput.value = longLink;
            showMessage("⚠️ 短链接服务暂时繁忙，已生成长链接（仍可正常分享）", false);
            if (!window.location.href.includes('#code=')) {
                history.pushState(null, '', longLink);
            }
        }
    }

    // 复制链接
    async function copyShareLink() {
        const link = shareLinkInput.value;
        if (!link || link === "点击「生成短链接」自动生成") {
            showMessage("请先点击「生成短链接」", true);
            return;
        }
        try {
            await navigator.clipboard.writeText(link);
            showMessage("📋 链接已复制到剪贴板！可粘贴至微信/邮件/文档", false);
        } catch (err) {
            showMessage("手动复制链接即可", true);
        }
    }

    // ------------------- 加载内置的研究计划书模板（绝对符合学术场景，带有预览测试）-------------------
    function loadResearchTemplate() {
        const researchHtml = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究计划书：企业ESG表现与债务融资成本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f2f4f8;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .paper {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 2rem 2.2rem;
        }
        h1 { font-size: 1.9rem; font-weight: 700; color: #0a2b3e; margin-bottom: 0.5rem; letter-spacing: -0.3px; }
        .badge { display: inline-block; background: #eef2fa; color: #1f6392; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .subhead { border-left: 3px solid #8aaec0; padding-left: 1rem; margin: 0.8rem 0 1.5rem 0; color: #2c4b6e; }
        .section { margin-bottom: 2rem; }
        .section-title { font-size: 1.4rem; font-weight: 600; border-bottom: 2px solid #e9edf2; padding-bottom: 0.3rem; margin-bottom: 1rem; color: #1e3b4c; }
        .card { background: #f9fafc; border-left: 5px solid #5f8bb3; padding: 1rem 1.5rem; border-radius: 18px; margin-bottom: 1rem; }
        .hypo-card { background: #fef8ed; border-left: 5px solid #c2a15b; padding: 1rem 1.5rem; border-radius: 18px; margin-bottom: 1rem; }
        .code-block { background: #f1f5f9; padding: 0.8rem 1.2rem; border-radius: 16px; font-family: monospace; font-size: 0.8rem; margin: 0.8rem 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f0f4fa; }
        .footer-note { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; font-size: 0.7rem; color: #6a7f9b; }
        @media (max-width: 650px) { .paper { padding: 1.2rem; } h1 { font-size: 1.4rem; } }
    </style>
</head>
<body>
<div class="paper">
    <span class="badge">公司金融 · 毕业论文/研究计划</span>
    <h1>ESG表现与债务融资成本：<br>基于信息不对称缓解视角的实证研究</h1>
    <div class="subhead">理论拓展 + 因果识别 + 面板数据实证 | 拟解决企业融资困境关键机制</div>
    
    <div class="section">
        <div class="section-title">一、Why：研究动机与理论贡献</div>
        <div class="card"><strong>🌍 现实背景：</strong> 双碳目标与ESG投资浪潮下，我国绿色金融体系快速发展，银行与债券市场愈发重视企业社会责任表现。</div>
        <div class="card"><strong>📚 文献缺口：</strong> 现有文献多集中于ESG与权益资本成本，对债务融资成本影响机制尤其是“信息不对称缓解”这一独立渠道缺乏深入检验。</div>
        <div class="card"><strong>🎯 增量贡献：</strong> 融合信号理论与利益相关者理论，检验ESG通过提高信息透明度显著降低债务融资成本的新机制。</div>
    </div>

    <div class="section">
        <div class="section-title">二、What：核心研究假设</div>
        <div class="hypo-card"><strong>H1（主效应）</strong>：ESG表现越好的企业，其债务融资成本越低。</div>
        <div class="hypo-card"><strong>H2（中介机制）</strong>：ESG表现通过缓解信息不对称（分析师预测分歧度/盈余平滑度）降低债务融资成本。</div>
        <div class="hypo-card"><strong>H3（异质性）</strong>：ESG降低债务融资成本效应在民营企业、高融资约束企业中更显著。</div>
    </div>

    <div class="section">
        <div class="section-title">三、How：实证策略与数据</div>
        <table>
            <thead><tr><th>变量类型</th><th>核心指标</th><th>数据来源</th></tr></thead>
            <tbody>
                <tr><td>被解释变量</td><td>利息支出/平均有息负债</td><td>CSMAR</td></tr>
                <tr><td>解释变量</td><td>华证ESG综合评分</td><td>Wind/商道融绿</td></tr>
                <tr><td>中介变量</td><td>分析师预测分歧度 / 盈余平滑度</td><td>CSMAR</td></tr>
                <tr><td>控制变量</td><td>规模、资产负债率、ROA、托宾Q、产权性质等</td><td>CSMAR</td></tr>
            </tbody>
        </table>
        <div class="code-block">
            <strong>基准模型（面板固定效应）</strong><br>
            CostDebt_{i,t} = α + β₁·ESG_{i,t-1} + γ·Controls_{i,t-1} + μ_i + λ_t + ε_{i,t}<br>
            <strong>中介效应（三步法）</strong>：检验信息不对称的中介比例，Sobel检验+ Bootstrap
        </div>
        <div class="card"><strong>📊 样本区间：</strong> 2015-2024年A股上市公司，剔除金融/ST/缺失值，最终约2.2万+公司-年度观测。</div>
        <div class="card"><strong>🛡️ 内生性处理：</strong> 滞后一期、行业均值IV、PSM-DID、安慰剂检验，确保因果稳健。</div>
    </div>

    <div class="section">
        <div class="section-title">四、预期成果与参考文献</div>
        <div class="code-block">✨ 预期ESG评分每提高一个标准差，债务融资成本下降约5%-8%，且信息不对称解释力占30%以上。</div>
        <div style="font-size: 0.8rem; margin-top: 0.5rem;">📄 核心文献：Goss & Roberts (2011), El Ghoul et al.(2011), Stellner et al.(2015), 吴非等(2021,管理世界)等。</div>
    </div>
    <div class="footer-note">
        ⚡ 本页面由「灵境·HTML工坊」生成短链分享，实时预览可用 | 数据支持 CSMAR / Wind
    </div>
</div>
</body>
</html>`;
        textarea.value = researchHtml;
        updatePreview();
        showMessage("已加载「ESG与债务融资成本」研究计划书模板，可自由修改并生成短链接", false);
        shareLinkInput.value = "";
    }

    // ------------------- 从URL的Hash恢复代码（支持分享的长链加载）--------------------
    function loadCodeFromHash() {
        const hash = window.location.hash.substring(1);
        if (hash && hash.startsWith('code=')) {
            try {
                let encodedCode = hash.substring(5);
                let decoded = decodeURIComponent(encodedCode);
                if (decoded && typeof decoded === 'string') {
                    textarea.value = decoded;
                    updatePreview();
                    showMessage("📎 已从分享链接加载内容，可编辑或重新生成新链接", false);
                    return true;
                }
            } catch (e) { console.warn(e); }
        }
        return false;
    }

    // ------------------- 事件绑定与初始化 -------------------
    function bindEvents() {
        runBtn.addEventListener('click', () => {
            updatePreview();
            showMessage("预览已刷新 ✓", false);
        });
        shareBtn.addEventListener('click', generateShortLink);
        copyLinkBtn.addEventListener('click', copyShareLink);
        resetDemoBtn.addEventListener('click', loadResearchTemplate);
        // Ctrl+Enter 快捷键刷新预览
        textarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                updatePreview();
                showMessage("快捷键刷新预览", false);
            }
        });
        // 如果用户修改文本，可以稍微提示，但不强制自动刷新（由用户主动刷新）
    }

    function init() {
        bindEvents();
        const loadedFromHash = loadCodeFromHash();
        if (!loadedFromHash) {
            // 默认加载研究模板，让用户立刻看到专业内容
            loadResearchTemplate();
        } else {
            // 已经加载了hash内容，确保预览正常
            updatePreview();
        }
    }
    
    init();
</script>
</body>
</html>
