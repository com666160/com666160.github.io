<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML工坊 - 短链接分享系统</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0f172a;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #1e293b;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .toolbar button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .toolbar button:hover { background: #2563eb; }
        .link-area {
            background: #0f172a;
            padding: 8px 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .link-area input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #475569;
            padding: 8px 12px;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 12px;
        }
        .link-area button {
            background: #10b981;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }
        .preview-pane {
            flex: 1;
            background: white;
            border-left: 2px solid #334155;
        }
        textarea {
            flex: 1;
            background: #0f172a;
            color: #e2e8f0;
            border: none;
            padding: 16px;
            font-family: monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status {
            font-size: 12px;
            color: #94a3b8;
            padding: 6px 16px;
            background: #0f172a;
            border-top: 1px solid #334155;
        }
        @media (max-width: 700px) {
            .main-container { flex-direction: column; }
            .preview-pane { border-left: none; border-top: 2px solid #334155; min-height: 300px; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <span style="font-weight: bold; color: white;">HTML 工坊</span>
    <button id="runBtn">刷新预览</button>
    <button id="publishBtn" style="background:#8b5cf6;">生成短链接</button>
    <button id="copyBtn">复制链接</button>
    <button id="demoBtn">加载示例</button>
</div>
<div class="link-area">
    <span style="color:#94a3b8; font-size:13px;">短链接：</span>
    <input type="text" id="shareLink" readonly placeholder="点击「生成短链接」获得短链接">
    <button id="shortenBtn" style="background:#f59e0b;">手动缩短</button>
</div>

<div class="main-container">
    <div class="editor-pane">
        <textarea id="htmlCode" placeholder="编写 HTML/CSS/JS 代码..."></textarea>
    </div>
    <div class="preview-pane">
        <iframe id="previewFrame" title="预览" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
</div>
<div class="status" id="statusMsg">
    提示：编写代码后点击「生成短链接」获得可分享的短链接
</div>

<script>
    const textarea = document.getElementById('htmlCode');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const publishBtn = document.getElementById('publishBtn');
    const copyBtn = document.getElementById('copyBtn');
    const demoBtn = document.getElementById('demoBtn');
    const shortenBtn = document.getElementById('shortenBtn');
    const shareLinkInput = document.getElementById('shareLink');
    const statusMsg = document.getElementById('statusMsg');

    function showMessage(msg, isError) {
        statusMsg.innerHTML = msg;
        statusMsg.style.color = isError ? '#f87171' : '#10b981';
        setTimeout(() => {
            statusMsg.style.color = '#94a3b8';
            statusMsg.innerHTML = '提示：编写代码后点击「生成短链接」获得可分享的短链接';
        }, 3000);
    }

    function updatePreview() {
        let code = textarea.value;
        if (!code.trim()) {
            code = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>空白页面</title></head><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;"><h2>欢迎使用</h2><p>在左侧编写 HTML 代码，点击「生成短链接」分享给任何人</p></body></html>';
            textarea.value = code;
        }
        const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(code);
        iframeDoc.close();
    }

    // 生成长链接（基于hash）
    function generateLongLink() {
        const code = textarea.value;
        if (!code.trim()) {
            showMessage('请先编写一些代码', true);
            return null;
        }
        const encoded = encodeURIComponent(code);
        const baseUrl = window.location.href.split('#')[0];
        return `${baseUrl}#code=${encoded}`;
    }

    // 使用免费短链接API（TinyURL）
    async function shortenUrl(longUrl) {
        try {
            // 使用 TinyURL 免费API
            const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
            if (response.ok) {
                const shortUrl = await response.text();
                return shortUrl;
            }
        } catch(e) {
            console.log('TinyURL失败');
        }
        
        // 备用方案：使用 is.gd 短链接服务
        try {
            const response = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
            if (response.ok) {
                const shortUrl = await response.text();
                return shortUrl;
            }
        } catch(e) {
            console.log('is.gd失败');
        }
        
        return null;
    }

    // 生成短链接并显示
    async function generateShortLink() {
        const longLink = generateLongLink();
        if (!longLink) return;
        
        showMessage('正在生成短链接...', false);
        const shortLink = await shortenUrl(longLink);
        
        if (shortLink) {
            shareLinkInput.value = shortLink;
            showMessage('短链接生成成功！复制即可分享', false);
            
            // 同时更新地址栏
            if (!window.location.href.includes('#code=')) {
                history.pushState(null, '', longLink);
            }
        } else {
            // 如果短链接服务都失败，显示长链接
            shareLinkInput.value = longLink;
            showMessage('短链接服务暂时不可用，已生成长链接（仍可分享）', true);
        }
    }

    // 复制链接
    async function copyLink() {
        const link = shareLinkInput.value;
        if (!link) {
            showMessage('请先点击「生成短链接」', true);
            return;
        }
        try {
            await navigator.clipboard.writeText(link);
            showMessage('链接已复制到剪贴板！', false);
        } catch(e) {
            showMessage('请手动复制链接', true);
        }
    }

    // 加载示例
    function loadDemo() {
        const demo = `<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>示例页面</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { color: #1e1b4b; }
        button {
            background: #7c3aed;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .counter { font-size: 48px; font-weight: bold; color: #7c3aed; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>分享成功！</h1>
        <p>这个页面是通过 HTML工坊 创建的</p>
        <div class="counter" id="count">0</div>
        <button onclick="document.getElementById('count').innerText++">点我 +1</button>
        <button onclick="document.getElementById('count').innerText=0" style="background:#64748b;">重置</button>
        <p style="margin-top:24px; font-size:12px; color:#666;">任何人都能通过短链接看到这个页面</p>
    </div>
</body>
</html>`;
        textarea.value = demo;
        updatePreview();
        showMessage('已加载示例，点击「生成短链接」即可分享', false);
    }

    // 从hash加载代码
    function loadFromHash() {
        const hash = window.location.hash.substring(1);
        if (hash && hash.startsWith('code=')) {
            try {
                const decoded = decodeURIComponent(hash.substring(5));
                if (decoded) {
                    textarea.value = decoded;
                    updatePreview();
                    showMessage('已从链接加载代码', false);
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    // 手动缩短当前长链接
    async function manualShorten() {
        const longLink = generateLongLink();
        if (!longLink) return;
        const shortLink = await shortenUrl(longLink);
        if (shortLink) {
            shareLinkInput.value = shortLink;
            showMessage('已生成短链接', false);
        } else {
            shareLinkInput.value = longLink;
            showMessage('短链接生成失败，已显示长链接', true);
        }
    }

    window.addEventListener('hashchange', () => { loadFromHash(); });

    function init() {
        runBtn.addEventListener('click', updatePreview);
        publishBtn.addEventListener('click', generateShortLink);
        copyBtn.addEventListener('click', copyLink);
        demoBtn.addEventListener('click', loadDemo);
        shortenBtn.addEventListener('click', manualShorten);
        textarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                updatePreview();
            }
        });
        const loaded = loadFromHash();
        if (!loaded) loadDemo();
        updatePreview();
    }

    init();
</script>
</body>
</html>
