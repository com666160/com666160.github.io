<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短链接·HTML分享工具</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0f172a;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #1e293b;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .toolbar button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar button:hover { background: #2563eb; }
        .toolbar .publish { background: #8b5cf6; }
        .toolbar .publish:hover { background: #7c3aed; }
        .result-area {
            background: #0f172a;
            padding: 12px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .result-area input {
            flex: 1;
            background: #1e293b;
            border: 1px solid #475569;
            padding: 10px 14px;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: monospace;
            font-size: 14px;
        }
        .result-area button {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .editor-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }
        .preview-pane {
            flex: 1;
            background: white;
            border-left: 2px solid #334155;
        }
        textarea {
            flex: 1;
            background: #0f172a;
            color: #e2e8f0;
            border: none;
            padding: 16px;
            font-family: 'Monaco', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status {
            font-size: 13px;
            padding: 8px 20px;
            background: #0f172a;
            border-top: 1px solid #334155;
            color: #94a3b8;
        }
        @media (max-width: 700px) {
            .main-container { flex-direction: column; }
            .preview-pane { border-left: none; border-top: 2px solid #334155; min-height: 280px; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <span style="font-weight: bold; color: white;">🔗 短链接·HTML工坊</span>
    <button id="runBtn">▶ 刷新预览</button>
    <button id="publishBtn" class="publish">✨ 生成短链接</button>
    <button id="demoBtn">📄 加载示例</button>
</div>
<div class="result-area">
    <span style="color:#94a3b8;">📎 短链接：</span>
    <input type="text" id="shortLinkInput" readonly placeholder="点击「生成短链接」">
    <button id="copyBtn">📋 复制链接</button>
</div>

<div class="main-container">
    <div class="editor-pane">
        <textarea id="htmlCode" placeholder="编写 HTML/CSS/JS 代码..."></textarea>
    </div>
    <div class="preview-pane">
        <iframe id="previewFrame" title="预览" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    </div>
</div>
<div class="status" id="statusMsg">
    💡 编写代码 → 点击「生成短链接」→ 复制链接分享给任何人
</div>

<script>
    const textarea = document.getElementById('htmlCode');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const publishBtn = document.getElementById('publishBtn');
    const copyBtn = document.getElementById('copyBtn');
    const demoBtn = document.getElementById('demoBtn');
    const shortLinkInput = document.getElementById('shortLinkInput');
    const statusMsg = document.getElementById('statusMsg');

    function showMessage(msg, isError) {
        statusMsg.innerHTML = msg;
        statusMsg.style.color = isError ? '#f87171' : '#10b981';
        setTimeout(() => {
            statusMsg.style.color = '#94a3b8';
            statusMsg.innerHTML = '💡 编写代码 → 点击「生成短链接」→ 复制链接分享给任何人';
        }, 4000);
    }

    function updatePreview() {
        let code = textarea.value;
        if (!code.trim()) {
            code = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>欢迎</title></head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
<div style="text-align:center"><h2>✨ HTML 短链接工坊</h2><p>编辑左侧代码，点击「生成短链接」获得短链接</p></div>
</body>
</html>`;
            textarea.value = code;
        }
        const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(code);
        iframeDoc.close();
    }

    // 生成长链接
    function generateLongLink() {
        const code = textarea.value;
        if (!code.trim()) {
            showMessage('❌ 请先编写代码', true);
            return null;
        }
        const encoded = encodeURIComponent(code);
        const baseUrl = window.location.href.split('#')[0];
        return `${baseUrl}#code=${encoded}`;
    }

    // 短链接服务
    async function getShortLink(longUrl) {
        // 方法1: TinyURL
        try {
            const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
            if (res.ok) {
                const short = await res.text();
                if (short && short.startsWith('http')) return short;
            }
        } catch(e) {}
        
        // 方法2: is.gd
        try {
            const res = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(longUrl)}`);
            if (res.ok) {
                const short = await res.text();
                if (short && short.startsWith('http')) return short;
            }
        } catch(e) {}
        
        return null;
    }

    // 生成短链接（主要功能）
    async function generateShortLink() {
        const longLink = generateLongLink();
        if (!longLink) return;
        
        showMessage('⏳ 正在生成短链接...', false);
        
        const shortLink = await getShortLink(longLink);
        
        if (shortLink) {
            // 只显示短链接！
            shortLinkInput.value = shortLink;
            showMessage('✅ 短链接生成成功！点击复制即可分享', false);
            // 同时更新浏览器地址栏（保持长链接用于分享）
            if (!window.location.href.includes('#code=')) {
                history.replaceState(null, '', longLink);
            }
        } else {
            // 如果短链接服务都失败，给出提示但不显示长链接
            showMessage('⚠️ 短链接服务暂时不可用，请稍后重试', true);
            shortLinkInput.value = '';
        }
    }

    // 复制链接
    async function copyLink() {
        const link = shortLinkInput.value;
        if (!link) {
            showMessage('❌ 请先点击「生成短链接」', true);
            return;
        }
        try {
            await navigator.clipboard.writeText(link);
            showMessage('📋 短链接已复制！粘贴发给任何人即可', false);
        } catch(e) {
            showMessage('请手动复制链接', true);
        }
    }

    // 加载示例
    function loadDemo() {
        const demo = `<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的分享页面</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { color: #1e1b4b; margin: 0 0 10px 0; }
        button {
            background: #7c3aed;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        .count { font-size: 48px; font-weight: bold; color: #7c3aed; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 分享成功！</h1>
        <p>通过短链接分享的页面</p>
        <div class="count" id="count">0</div>
        <button onclick="count.innerText++">点我 +1</button>
        <button onclick="count.innerText=0">重置</button>
        <p style="font-size:12px; color:#666;">任何人点开短链接都能看到这个页面</p>
    </div>
    <script>const count = document.getElementById('count');<\/script>
</body>
</html>`;
        textarea.value = demo;
        updatePreview();
        showMessage('✅ 示例已加载，点击「生成短链接」', false);
        shortLinkInput.value = '';
    }

    // 从hash加载（别人打开链接时）
    function loadFromHash() {
        const hash = window.location.hash.substring(1);
        if (hash && hash.startsWith('code=')) {
            try {
                const decoded = decodeURIComponent(hash.substring(5));
                if (decoded) {
                    textarea.value = decoded;
                    updatePreview();
                    showMessage('📎 已从链接加载页面', false);
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    window.addEventListener('hashchange', () => loadFromHash());

    function init() {
        runBtn.addEventListener('click', updatePreview);
        publishBtn.addEventListener('click', generateShortLink);
        copyBtn.addEventListener('click', copyLink);
        demoBtn.addEventListener('click', loadDemo);
        
        textarea.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                updatePreview();
            }
        });
        
        const loaded = loadFromHash();
        if (!loaded) {
            loadDemo();
        }
        updatePreview();
    }

    init();
</script>
</body>
</html>
